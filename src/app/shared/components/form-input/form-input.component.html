<div>
  <!-- Label -->
  <label [for]="inputId" class="block mb-2 text-sm font-medium text-red-50">
    {{ label }}
    @if (required) {
    <span class="text-red-500">*</span>
    }
  </label>

  <!-- Input -->
  <input [type]="type" [id]="inputId" [formControl]="control" [placeholder]="placeholder"
    [class.border-red-500]="isInvalid" class="block w-full px-3 py-2 text-sm text-gray-600 bg-white border border-gray-300 rounded-md shadow-sm
           focus:ring-2 focus:ring-yellow-500 focus:border-yellow-500" />

  <!-- Error message (API error OR validation error) -->
  @if (isInvalid && activeErrorMessage) {
  <p class="mt-1 text-xs text-red-500">{{ activeErrorMessage }}</p>
  }
</div>
